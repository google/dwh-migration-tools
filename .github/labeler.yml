BUILD:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**/*'
          - 'gradle/**/*'
          - 'buildSrc/**/*'
          - 'build.gradle'
          - 'settings.gradle'
          - 'gradle.properties'
          - 'gradlew'
          - 'gradlew.bat'

ROOT:
  - changed-files:
      - any-glob-to-any-file: '*'

SECURITY:
  - changed-files:
      - any-glob-to-any-file: '.security/**/*'

DOCS:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**/*'
          - '**/*.md'

Client:
  - changed-files:
      - any-glob-to-any-file: 'client/**/*'
Dumper:
  - changed-files:
    - any-glob-to-any-file: 'dumper/**/*'

AIRFLOW:
  - changed-files:
    - any-glob-to-any-file: 'dumper/app/src/main/java/com/google/edwmigration/dumper/application/dumper/connector/airflow/**/*'

